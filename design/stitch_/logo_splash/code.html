</div>

<div class="mb-12 relative group">
<div class="w-32 h-32 flex items-center justify-center">
<svg class="w-full h-full fill-none stroke-primary" stroke-width="0.75" viewbox="0 0 100 100">
<!-- Abstract interpretation of a plum blossom petal / scholar's seal edge -->
<path d="M50 10 C 70 10, 90 30, 90 50 C 90 70, 70 90, 50 90 C 30 90, 10 70, 10 50 C 10 30, 30 10, 50 10" stroke-linecap="square"></path>
<path class="plum-branch-stroke" d="M35 50 L 65 50"></path>

<path d="M20 20 L 25 20 M 20 20 L 20 25"></path>
<path d="M80 80 L 75 80 M 80 80 L 80 75"></path>
</svg>
</div>
</div>

<p class="font-label text-[10px] tracking-[0.4em] uppercase text-on-surface-variant/60">

                </p>
</div>

<div class="mt-32 flex flex-col items-center space-y-6">
<div class="zen-progress-track">
<div class="zen-progress-bar"></div>
</div>
<!-- Status Label -->
<span class="font-label text-[9px] tracking-[0.2em] text-outline italic">

</div>
</section>
